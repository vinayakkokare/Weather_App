<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Weather App</h1>
        <nav>
            <a href="#" onclick="showHome()">Home</a>
            <a href="#" onclick="showAddCity()">Add City</a>
            <a href="#" onclick="showViewCities()">View Cities</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to the Weather App</h2>
        <p>Your one stop shop for all your weather needs!</p>
    </section>

    <section id="home_section">
        <section class="features">
            <div class="left_section">
                <div class="card">
                    <span id="location">Location: </span>
                    <span id="lvalue">Mumbai</span>
                </div>

                <div class="card1">

                    <h2>Current Weather</h2>
                    <hr>
                    <section class="weather_info">
                        <span id="temperature">Temperature: </span>
                            <span id="tvalue">25°C</span><br><br>
                        <span id="humidity">Humidity: </span>
                        <span id="hvalue">60%</span><br><br>
                        <span id="wind">Wind Speed: 
                            <span id="wvalue">10 km/h</span><br><br>
                        <span id="condition">Condition: 
                            <span id="cvalue">Sunny</span>
                        </span>
                    </section>
                </div>
            </div>

            <div class="card2">
                <h2>7-Day Forcasting</h2>
                <hr>
                <section class="forecast" id="forecast">
                
                </section>
            </div>
        </section>
    </section>

    <section id="add_city" style="display:none">
        <div class="addcity">

            <h2>Add New City</h2>

            <form id="Addcityform">
                <label for="city_name">City Name</label>
                <input type="text" id="city_name" name="city_name" required>
                <button type="submit"> Add City</button>
            </form>

        </div>
    </section>

    <section id="view_cities" style="display:none">
        <div class="viewcities">

        <h2>Saved Cities</h2>
        <hr>
        <ul id="cities_list">
        </ul>

        </div>

    </section>



    <script src="script.js"></script>
</body>

</html>
